# ============================================================
# Evolution API - WhatsApp Gateway (Baileys-based)
# Upgraded to v2 — run alongside Flask backend
#
# Usage:
#   docker-compose -f docker-compose.evolution.yml up -d
#
# On Linux hosts replace host.docker.internal references in
# .env.evolution with your host machine's LAN IP (e.g. 192.168.x.x)
# ============================================================

services:
  evolution-api:
    container_name: evolution-api
    image: atendai/evolution-api:v2.2.3
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env.evolution
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
    # Allows Evolution API to reach host machine services (Flask, Postgres)
    # via host.docker.internal on Linux add: --add-host=host.docker.internal:host-gateway
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - evolution-net

  redis:
    container_name: evolution-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evolution-net

volumes:
  evolution_instances:
    driver: local
  redis_data:
    driver: local

networks:
  evolution-net:
    driver: bridge