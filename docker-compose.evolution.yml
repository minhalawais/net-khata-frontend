# ============================================================
# Evolution API - WhatsApp Gateway (Baileys-based)
# Run alongside the Flask backend for WhatsApp messaging
# Usage: docker-compose -f docker-compose.evolution.yml up -d
# ============================================================

services:
  evolution-api:
    container_name: evolution-api
    image: atendai/evolution-api:v1.8.2
    restart: unless-stopped
    ports:
      - "8081:8080"
    env_file:
      - .env.evolution
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - evolution-net

  redis:
    container_name: evolution-redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evolution-net

volumes:
  evolution_instances:
    driver: local
  redis_data:
    driver: local

networks:
  evolution-net:
    driver: bridge
